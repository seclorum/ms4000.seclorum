name: Docker Build & Publish - MS4000 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write        # Required to push to ghcr.io

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR only when we intend to push (on main/master)
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          load: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            UID=1000
            GID=1000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify build and extract artifacts
        run: |
          echo "=== Running verification inside container ==="

          docker run --rm --name builder ms4000-firmware-builder:${{ github.sha }} bash -c '
            set -e
            echo "Firmware build check:"
            ls -la firmware/.pio/build/ || echo "Warning: No .pio/build found"
            
            if [ -f firmware/.pio/build/*/firmware.bin ]; then
              echo "✅ firmware.bin found!"
              mkdir -p /tmp/artifacts/firmware
              find firmware/.pio/build/ -name "firmware.bin" -exec cp {} /tmp/artifacts/firmware/ \;
            fi

            echo "Webapp build check:"
            ls -la web/app/dist/ || echo "Warning: No web/app/dist found"
            if [ -d web/app/dist ]; then
              echo "✅ Webapp dist folder found!"
              mkdir -p /tmp/artifacts/web
              cp -r web/app/dist /tmp/artifacts/web/
            fi
          '

          # Copy artifacts from container to host
          docker cp builder:/tmp/artifacts ./artifacts || echo "No artifacts folder created (build may have issues)"

      - name: Upload firmware.bin artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: ./artifacts/firmware/firmware.bin
          if-no-files-found: warn
          retention-days: 30

      - name: Upload webapp build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist
          path: ./artifacts/web/dist
          if-no-files-found: warn
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "Docker Build Summary"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          if [[ "${{ github.event_name }}" == "push" && ("${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master") ]]; then
            echo "✅ Image pushed to: ghcr.io/${{ github.repository }}:latest"
            echo "                  ghcr.io/${{ github.repository }}:${{ github.sha }}"
          else
            echo "✅ Build completed (no push on PRs)"
          fi
          echo "Artifacts uploaded (if build succeeded)"
