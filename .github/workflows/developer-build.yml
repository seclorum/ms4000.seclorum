name: Build MS4000 Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write          # For gh-pages deployment
  id-token: write       # Required for GitHub Pages

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ms4000-firmware-builder:latest
          build-args: |
            UID=1000
            GID=1000
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Verify build and extract binaries
        id: verify
        run: |
          echo "=== Running verification inside container ==="

          docker run --rm ms4000-firmware-builder:latest bash -c '
            set -euo pipefail
            cd firmware

            echo "→ Building firmware + filesystem image..."
            pio run -t buildfs

            echo "→ Locating binaries..."
            FIRMWARE_BIN=$(find .pio/build/ -name "firmware.bin" | head -n 1)
            FILESYSTEM_BIN=$(find .pio/build/ -name "*fs.bin" | head -n 1)   # catches spiffs.bin or littlefs.bin

            if [ -n "$FIRMWARE_BIN" ]; then
              echo "✅ firmware.bin found"
              mkdir -p /tmp/artifacts/firmware
              cp "$FIRMWARE_BIN" /tmp/artifacts/firmware/firmware.bin
            else
              echo "❌ firmware.bin not found!"
              exit 1
            fi

            if [ -n "$FILESYSTEM_BIN" ]; then
              echo "✅ filesystem image found: $(basename $FILESYSTEM_BIN)"
              cp "$FILESYSTEM_BIN" /tmp/artifacts/firmware/filesystem.bin
            else
              echo "⚠️  No filesystem image (spiffs.bin / littlefs.bin) found"
            fi

            echo "=== Verification completed ==="
          '

      - name: Extract artifacts from container
        run: |
          echo "Extracting build artifacts..."
          CONTAINER_ID=$(docker create ms4000-firmware-builder:latest)
          docker cp $CONTAINER_ID:/tmp/artifacts ./artifacts 2>/dev/null || echo "No artifacts directory"
          docker rm $CONTAINER_ID

      - name: Print binary details
        run: |
          echo "=== Binary Details ==="
          if [ -f ./artifacts/firmware/firmware.bin ]; then
            echo "firmware.bin:"
            ls -lh ./artifacts/firmware/firmware.bin
            md5sum ./artifacts/firmware/firmware.bin
          else
            echo "firmware.bin: Not found"
          fi

          if [ -f ./artifacts/firmware/filesystem.bin ]; then
            echo "filesystem.bin:"
            ls -lh ./artifacts/firmware/filesystem.bin
            md5sum ./artifacts/firmware/filesystem.bin
          else
            echo "filesystem.bin: Not found"
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin-${{ github.sha }}
          path: ./artifacts/firmware/
          if-no-files-found: warn
          retention-days: 60
          compression-level: 0

      - name: Upload webapp artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist-${{ github.sha }}
          path: ./artifacts/web/dist
          if-no-files-found: warn
          retention-days: 60

      - name: Build Summary
        if: always()
        run: |
          echo "🚀 MS4000 Firmware Build Summary"
          echo "Commit : ${{ github.sha }}"
          echo "Status : ${{ job.status }}"

  # ==================== Deploy Job (only on push to main/master) ====================
  deploy:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts from build job
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Prepare files for gh-pages and Release
        run: |
          mkdir -p ./deploy/firmware ./deploy/web
          # Copy binaries
          cp -f ./downloaded-artifacts/firmware-bin-*/firmware.bin   ./deploy/firmware/ 2>/dev/null || true
          cp -f ./downloaded-artifacts/firmware-bin-*/filesystem.bin ./deploy/firmware/ 2>/dev/null || true
          # Copy webapp
          cp -r ./downloaded-artifacts/webapp-dist-*/. ./deploy/web/ 2>/dev/null || true

          # Create a simple index.html for gh-pages
          cat > ./deploy/index.html << EOF
          <html><head><title>MS4000 Firmware Downloads</title></head><body>
          <h1>MS4000 development-build: Firmware & Webapp</h1>
          <p>Latest development build from commit: <code>${{ github.sha }}</code></p>
          <p>WARNING: Very Experimental - for now - may contain bugs and unimplemented features.</p>
          <ul>
            <li><a href="firmware/firmware.bin">firmware.bin</a></li>
            <li><a href="firmware/filesystem.bin">filesystem.bin</a> (if present)</li>
            <li><a href="web/">Webapp (dist folder)</a></li>
          </ul>
          </body></html>
          EOF

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: false   # Keep history (set true if you want clean history)

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Firmware Build ${{ github.sha }}
          body: |
            Automatic build from commit ${{ github.sha }}.
            - firmware.bin
            - filesystem.bin (if built)
            - Webapp dist
          draft: false
          prerelease: false
          files: |
            ./deploy/firmware/firmware.bin
            ./deploy/firmware/filesystem.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
